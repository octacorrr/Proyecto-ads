<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Interactive Experience</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; cursor: crosshair; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
        }
        .status {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #00ff88;
            font-size: 0.8em;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 5;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Vortex Render v2.0</h1>
        <p>Calibrando flujo de datos...</p>
    </div>
    
    <div class="status" id="status-msg">Iniciando motor de partículas...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        const ADSTERRA_LINK = "https://www.profitablecpmratenetwork.com/i58ybjji?key=73a14d9c473c542264e3757a845ebfe8";
        let canTrigger = false;
        let clickCount = 0;

        // --- LÓGICA DE OPTIMIZACIÓN ---
        
        // Esperar 7 segundos antes de permitir que el anuncio se dispare
        setTimeout(() => {
            canTrigger = true;
            document.getElementById('status-msg').innerText = "Sistema Sincronizado - Haz clic para interactuar";
        }, 7000);

        function gestionarClic() {
            if (canTrigger) {
                clickCount++;
                // El anuncio salta solo después del segundo clic para asegurar interés
                if (clickCount >= 2) {
                    window.open(ADSTERRA_LINK, '_blank');
                    clickCount = 0; // Reinicia para la siguiente interacción
                }
            }
        }

        window.addEventListener('click', gestionarClic);

        // --- MOTOR VISUAL ---
        let scene, camera, renderer, particles;
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 3;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(10000 * 3);
            for(let i=0; i<10000*3; i++) pos[i] = (Math.random()-0.5)*8;
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

            const mat = new THREE.PointsMaterial({ size: 0.01, color: 0x00ff88, transparent: true, opacity: 0.6 });
            particles = new THREE.Points(geo, mat);
            scene.add(particles);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.003;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
