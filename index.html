<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Vortex Experience - Native Ads</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; cursor: move; }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff88;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,255,136,0.5);
        }
        
        .status {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 0.7em;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 5;
            pointer-events: none;
        }
        
        #timer-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 3px;
            background: #00ff88;
            width: 0%;
            transition: width 1s linear;
            z-index: 20;
        }

        /* CONTENEDOR FLOTANTE PARA EL BANNER NATIVO */
        .ad-container {
            position: absolute;
            z-index: 15;
            display: none; /* Permanecerá oculto al inicio */
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 255, 136, 0.3);
            padding: 10px;
            border-radius: 6px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            text-align: center;
            min-width: 320px; /* Asegura el espacio mínimo para banners nativos */
        }
    </style>
</head>
<body>
    <div id="timer-bar"></div>
    
    <div id="ui">
        <h1>Vortex Render v3.5</h1>
        <p id="desc">Inicializando entorno 3D...</p>
    </div>
    
    <div class="status" id="status-msg">Arrastra para rotar en 3D</div>

    <div id="ad-bottom" class="ad-container">
        <script async="async" data-cfasync="false" src="https://pl29489521.effectivecpmnetwork.com/c88c2570ee0a2707fe551159abbadfcb/invoke.js"></script>
        <div id="container-c88c2570ee0a2707fe551159abbadfcb"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        let timeLeft = 10; 

        // --- TEMPORIZADOR PARA MOSTRAR EL CONTENEDOR ---
        const timerInterval = setInterval(() => {
            timeLeft--;
            const progress = ((10 - timeLeft) / 10) * 100;
            document.getElementById('timer-bar').style.width = progress + "%";
            
            if (timeLeft <= 0) {
                document.getElementById('desc').innerText = "Simulación Optimizada";
                document.getElementById('status-msg').innerText = "Interacción 3D Activa";
                
                // Hace visible el bloque donde pusimos tu script nativo
                document.getElementById('ad-bottom').style.display = 'block';
                
                clearInterval(timerInterval);
            }
        }, 1000);

        // --- MOTOR 3D INTERACTIVO ---
        let scene, camera, renderer, particles, controls;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.4;

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(15000 * 3);
            const colors = new Float32Array(15000 * 3);

            for(let i=0; i<15000*3; i+=3) {
                pos[i] = (Math.random()-0.5)*10;
                pos[i+1] = (Math.random()-0.5)*10;
                pos[i+2] = (Math.random()-0.5)*10;
                colors[i] = 0; 
                colors[i+1] = Math.random(); 
                colors[i+2] = 0.5;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const mat = new THREE.PointsMaterial({ 
                size: 0.015, 
                vertexColors: true, 
                transparent: true, 
                opacity: 0.8 
            });

            particles = new THREE.Points(geo, mat);
            scene.add(particles);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
