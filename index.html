<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Vortex Experience</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; cursor: move; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff88;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,255,136,0.5);
        }
        .status {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 0.7em;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 5;
        }
        #timer-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 3px;
            background: #00ff88;
            width: 0%;
            transition: width 1s linear;
        }
    </style>
</head>
<body>
    <div id="timer-bar"></div>
    <div id="ui">
        <h1>Vortex Render v3.0</h1>
        <p id="desc">Inicializando entorno 3D...</p>
    </div>
    
    <div class="status" id="status-msg">Arrastra para rotar en 3D</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        const ADSTERRA_LINK = "https://www.profitablecpmratenetwork.com/i58ybjji?key=73a14d9c473c542264e3757a845ebfe8";
        let canTrigger = false;
        let clickCount = 0;
        let timeLeft = 10; // Segundos para activar el link

        // --- LÓGICA DE TEMPORIZADOR Y BARRA ---
        const timerInterval = setInterval(() => {
            timeLeft--;
            const progress = ((10 - timeLeft) / 10) * 100;
            document.getElementById('timer-bar').style.width = progress + "%";
            
            if (timeLeft <= 0) {
                canTrigger = true;
                document.getElementById('desc').innerText = "Motor Sincronizado";
                document.getElementById('status-msg').innerText = "Calibración completa. Toca para continuar.";
                clearInterval(timerInterval);
            }
        }, 1000);

        function gestionarClic() {
            if (canTrigger) {
                clickCount++;
                if (clickCount >= 1) { // Salta al primer clic después del tiempo
                    window.open(ADSTERRA_LINK, '_blank');
                    clickCount = 0;
                }
            }
        }
        window.addEventListener('mousedown', gestionarClic);

        // --- MOTOR 3D INTERACTIVO ---
        let scene, camera, renderer, particles, controls;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Controles de órbita para mover en 3D
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(15000 * 3);
            const colors = new Float32Array(15000 * 3);

            for(let i=0; i<15000*3; i+=3) {
                pos[i] = (Math.random()-0.5)*10;
                pos[i+1] = (Math.random()-0.5)*10;
                pos[i+2] = (Math.random()-0.5)*10;
                colors[i] = 0; 
                colors[i+1] = Math.random(); 
                colors[i+2] = 0.5;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const mat = new THREE.PointsMaterial({ 
                size: 0.015, 
                vertexColors: true, 
                transparent: true, 
                opacity: 0.8 
            });

            particles = new THREE.Points(geo, mat);
            scene.add(particles);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Actualiza el movimiento del usuario
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
