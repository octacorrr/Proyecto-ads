<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Vortex Experience - Fixed Ads</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; cursor: move; }
        
        #ui {
            position: absolute;
            top: 290px; /* Bajado drásticamente para dar espacio completo al banner superior */
            left: 20px;
            color: #00ff88;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,255,136,0.5);
        }
        
        .status {
            position: absolute;
            bottom: 290px; /* Subido drásticamente para dar espacio completo al banner inferior */
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 0.7em;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 5;
            pointer-events: none;
        }
        
        #timer-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 3px;
            background: #00ff88;
            width: 0%;
            transition: width 1s linear;
            z-index: 30;
        }

        /* CONTENEDORES CON EL TAMAÑO NATIVO REQUERIDO (Ajustado para no cortarse) */
        .ad-wrapper {
            position: absolute;
            z-index: 20;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
            padding: 10px;
            display: none; /* Inician ocultos */
            width: 340px;  /* Ancho ideal para el bloque nativo */
            height: 250px; /* Altura estándar de Adsterra para que no se vea negro ni cortado */
        }

        .ad-top-position { top: 20px; }
        .ad-bottom-position { bottom: 20px; }

        .ad-content {
            width: 100%;
            height: 100%;
        }

        /* BOTÓN DE CIERRE (X) */
        .close-ad-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff3b30;
            color: white;
            border: 1px solid #fff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 25;
        }
    </style>
</head>
<body>
    <div id="timer-bar"></div>
    
    <div id="ui">
        <h1>Vortex Render v4.5</h1>
        <p id="desc">Inicializando entorno 3D...</p>
    </div>
    
    <div class="status" id="status-msg">Arrastra para rotar en 3D</div>

    <div id="ad-top-wrap" class="ad-wrapper ad-top-position">
        <button class="close-ad-btn" onclick="cerrarYEspera('ad-top-wrap')">X</button>
        <div class="ad-content">
            <script async="async" data-cfasync="false" src="https://pl29489521.effectivecpmnetwork.com/c88c2570ee0a2707fe551159abbadfcb/invoke.js"></script>
            <div id="container-c88c2570ee0a2707fe551159abbadfcb"></div>
        </div>
    </div>

    <div id="ad-bottom-wrap" class="ad-wrapper ad-bottom-position">
        <button class="close-ad-btn" onclick="cerrarYEspera('ad-bottom-wrap')">X</button>
        <div class="ad-content">
            <div id="container-bottom-placeholder"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        let timeLeft = 10; 

        // --- MANEJO DE OCULTADO Y REAPARICIÓN ---
        function cerrarYEspera(idWrapper) {
            // Ocultamos la caja del anuncio de inmediato
            const wrapper = document.getElementById(idWrapper);
            wrapper.style.display = 'none';

            // Tiempo de espera de 5 a 8 segundos
            const tiempoEspera = Math.floor(Math.random() * (8000 - 5000 + 1)) + 5000;

            setTimeout(() => {
                // Volvemos a mostrar la caja. Al cambiar el estado de display,
                // forzamos al navegador a repintar el bloque.
                wrapper.style.display = 'block';
            }, tiempoEspera);
        }

        // --- CRONÓMETRO DE ARRANQUE ---
        const timerInterval = setInterval(() => {
            timeLeft--;
            const progress = ((10 - timeLeft) / 10) * 100;
            document.getElementById('timer-bar').style.width = progress + "%";
            
            if (timeLeft <= 0) {
                document.getElementById('desc').innerText = "Simulación Optimizada";
                document.getElementById('status-msg').innerText = "Interacción 3D Activa";
                
                // Clonar el bloque publicitario para el contenedor de abajo antes de mostrarlo
                const adOriginal = document.getElementById('container-c88c2570ee0a2707fe551159abbadfcb');
                if (adOriginal) {
                    document.getElementById('container-bottom-placeholder').innerHTML = adOriginal.innerHTML;
                }

                // Hacemos visibles ambos bloques de forma limpia
                document.getElementById('ad-top-wrap').style.display = 'block';
                document.getElementById('ad-bottom-wrap').style.display = 'block';
                
                clearInterval(timerInterval);
            }
        }, 1000);

        // --- MOTOR 3D INTERACTIVO ---
        let scene, camera, renderer, particles, controls;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.4;

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(15000 * 3);
            const colors = new Float32Array(15000 * 3);

            for(let i=0; i<15000*3; i+=3) {
                pos[i] = (Math.random()-0.5)*10;
                pos[i+1] = (Math.random()-0.5)*10;
                pos[i+2] = (Math.random()-0.5)*10;
                colors[i] = 0; 
                colors[i+1] = Math.random(); 
                colors[i+2] = 0.5;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const mat = new THREE.PointsMaterial({ 
                size: 0.015, 
                vertexColors: true, 
                transparent: true, 
                opacity: 0.8 
            });

            particles = new THREE.Points(geo, mat);
            scene.add(particles);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
    </html>
